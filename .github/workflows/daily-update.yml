name: Daily GitHub Skills Update

on:
  schedule:
    - cron: '0 0 * * *'
  
  workflow_dispatch:

  push:
    branches:
      - master
    paths:
      - 'scripts/**'
      - 'data/**'
      - '.github/workflows/daily-update.yml'

permissions:
  contents: write

jobs:
  update-skills:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests>=2.28.0
      
      - name: Fetch GitHub Skills Data
        id: fetch
        run: |
          echo "🚀 Starting to fetch GitHub skills data..."
          echo "⏰ Current time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          
          mkdir -p data
          python scripts/fetch_skills.py
          
          if [ -f data/skills.json ]; then
            skills_count=$(python -c "import json; print(len(json.load(open('data/skills.json')).get('skills', [])))")
            echo "✅ Skills data fetched successfully"
            echo "📊 Total skills fetched: $skills_count"
            echo "skills_count=$skills_count" >> "$GITHUB_OUTPUT"
          else
            echo "❌ Failed to fetch skills data"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Generate Multi-language Pages
        run: |
          echo "🌐 Generating multi-language HTML pages..."
          python scripts/generate_multilang.py
          
          if [ -f index-zh-CN.html ] && [ -f index-en.html ]; then
            echo "✅ Multi-language pages generated successfully"
          else
            echo "⚠️ Some pages may not have been generated"
          fi
      
      - name: Check for changes
        id: check_changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          
          git add -A
          
          if git diff --cached --quiet; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "📝 No changes detected"
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "✅ Changes detected"
          fi
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          commit_msg="🤖 Auto-update: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          
          git commit -m "$commit_msg"
          
          echo "📝 Commit message: $commit_msg"
          echo "🔧 Configuring git push..."
          
          git branch -v
          git remote -v
          
          echo "🔄 Pushing changes..."
          git push "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:master
          
          echo "✅ Push successful!"
      
      - name: Upload skills data artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: skills-data-${{ github.run_id }}
          path: data/skills.json
          retention-days: 7
      
      - name: Generate update report
        if: always()
        run: |
          echo "## 📊 Daily Skills Update Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Details |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Timestamp | $(date) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Run Number | #${{ github.run_number }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | ${{ github.event_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Skills Count | ${{ steps.fetch.outputs.skills_count }} |" >> "$GITHUB_STEP_SUMMARY"
          
          if [ "${{ steps.check_changes.outputs.changes }}" == "true" ]; then
            echo "| Status | ✅ Updated successfully |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Status | ℹ️ No update needed |" >> "$GITHUB_STEP_SUMMARY"
          fi
          
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "🌐 Website: [skill-hub-liart.vercel.app](https://skill-hub-liart.vercel.app)" >> "$GITHUB_STEP_SUMMARY"