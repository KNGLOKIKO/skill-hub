        function computeRelevance(project, query) {
            const q = query.toLowerCase().trim();
            if (!q) return 0;
            let score = 0;
            const name = project.name.toLowerCase();
            const enDesc = project.enDesc.toLowerCase();
            const zhDesc = project.zhDesc.toLowerCase();
            const tags = (project.tags || []).map(t => t.toLowerCase());
            if (name === q) score += 120;
            else if (name.startsWith(q)) score += 90;
            else if (name.includes(q)) score += 65;
            const qWords = q.split(/\s+/).filter(w => w.length > 0);
            qWords.forEach(word => {
                if (name.includes(word)) score += 25;
                const enCount = (enDesc.match(new RegExp(word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi')) || []).length;
                score += enCount * 12;
                const zhCount = zhDesc.split(word).length - 1;
                score += zhCount * 10;
            });
            tags.forEach(tag => {
                if (tag === q) score += 50;
                else if (tag.includes(q)) score += 30;
                else qWords.forEach(w => { if (tag.includes(w)) score += 15; });
            });
            return score;
        }

        function getRelevanceLabel(score, lang) {
            if (score >= 100) return { label: T(lang, {zh:'完全匹配', 'zh-TW':'完全匹配', ja:'完全一致', en:'Exact'}), color: '#16a34a' };
            if (score >= 70) return { label: T(lang, {zh:'高度相关', 'zh-TW':'高度相關', ja:'高関連', en:'High'}), color: '#2563eb' };
            if (score >= 40) return { label: T(lang, {zh:'相关', 'zh-TW':'相關', ja:'関連', en:'Related'}), color: '#9333ea' };
            return { label: T(lang, {zh:'部分匹配', 'zh-TW':'部分匹配', ja:'部分一致', en:'Partial'}), color: '#6b7280' };
        }

        function mapLanguageCode(code) {
            if (!code) return null;
            const c = code.toLowerCase().trim();
            if (c === 'zh-tw' || c === 'zh-hk' || c === 'zh-mo' || c === 'zh-hant' || c === 'zh-hant-tw' || c === 'zh-hant-hk') return 'zh-TW';
            if (c === 'zh-cn' || c === 'zh-sg' || c === 'zh-hans' || c === 'zh-hans-cn' || c.startsWith('zh')) return 'zh';
            if (c.startsWith('ja')) return 'ja';
            if (c.startsWith('en')) return 'en';
            return null;
        }

        function safeGetLocalStorage(key) {
            try { return localStorage.getItem(key); }
            catch (e) { return null; }
        }

        function safeSetLocalStorage(key, value) {
            try { localStorage.setItem(key, value); return true; }
            catch (e) { return false; }
        }

        function detectLanguage() {
            if (window.__INITIAL_LANG && SUPPORTED_LANGS.includes(window.__INITIAL_LANG)) return window.__INITIAL_LANG;

            const saved = safeGetLocalStorage('lang');
            if (saved && SUPPORTED_LANGS.includes(saved)) return saved;

            try {
                const browserLangs = navigator.languages || [];
                for (const rawLang of browserLangs) {
                    const mapped = mapLanguageCode(rawLang);
                    if (mapped) return mapped;
                }
            } catch (e) { /* navigator.languages unavailable */ }

            try {
                const rawLang = (navigator.language || navigator.userLanguage || '');
                const mapped = mapLanguageCode(rawLang);
                if (mapped) return mapped;
            } catch (e) { /* navigator.language unavailable */ }

            return PRIMARY_LANG;
        }
